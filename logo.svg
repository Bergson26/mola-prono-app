<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0d1a40"/>
      <stop offset="100%" stop-color="#071223"/>
    </radialGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>

  <!-- Outer shadow circle -->
  <circle cx="102" cy="104" r="94" fill="rgba(0,0,0,0.3)"/>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="94" fill="url(#bgGrad)"/>

  <!-- Shine overlay -->
  <ellipse cx="80" cy="60" rx="55" ry="38" fill="url(#shineGrad)"/>

  <!-- Blue border ring -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="rgba(29,78,216,0.5)" stroke-width="2"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(29,78,216,0.2)" stroke-width="1"/>

  <!-- Football (soccer ball) -->
  <g transform="translate(100, 48) scale(0.7)" opacity="0.95">
    <circle cx="0" cy="0" r="22" fill="white"/>
    <polygon points="0,-10 9.5,-3 5.9,8 -5.9,8 -9.5,-3" fill="#1d4ed8"/>
    <polygon points="0,-22 9,-17 9,-10 0,-10 -9,-10 -9,-17" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
    <polygon points="9,-10 18,-5 19,5 9.5,8 9,-10" fill="#1d4ed8" opacity="0.5"/>
    <polygon points="-9,-10 -18,-5 -19,5 -9.5,8 -9,-10" fill="#1d4ed8" opacity="0.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
  </g>

  <!-- MP letters -->
  <text
    x="100" y="155"
    font-family="'Arial Black', 'Georgia', sans-serif"
    font-size="76"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-3"
    filter="url(#shadow)"
  >MP</text>

  <!-- Accent line -->
  <rect x="52" y="163" width="96" height="2.5" rx="1.25" fill="rgba(29,78,216,0.7)"/>
</svg>
