<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#6B0000"/>
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <circle cx="103" cy="104" r="95" fill="rgba(0,0,0,0.35)"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Dark outer border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#0d0000" stroke-width="7"/>
  <!-- Gold ring outer -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#D4AF37" stroke-width="3.5"/>
  <!-- Gold ring inner (thin) -->
  <circle cx="100" cy="100" r="79" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.7"/>
  <!-- Cardinal gold dots -->
  <circle cx="100" cy="13" r="5.5" fill="#D4AF37"/>
  <circle cx="187" cy="100" r="5.5" fill="#D4AF37"/>
  <circle cx="100" cy="187" r="5.5" fill="#D4AF37"/>
  <circle cx="13" cy="100" r="5.5" fill="#D4AF37"/>
  <!-- Top decorative diamond -->
  <polygon points="100,29 114,48 100,60 86,48" fill="#D4AF37"/>
  <polygon points="100,34 110,48 100,56 90,48" fill="#8B0000"/>
  <!-- MP shadow text -->
  <text x="102" y="130" font-family="Georgia,'Times New Roman',serif"
        font-size="80" font-weight="bold" fill="#3a0a00"
        text-anchor="middle" letter-spacing="-4">MP</text>
  <!-- MP gold text -->
  <text x="100" y="128" font-family="Georgia,'Times New Roman',serif"
        font-size="80" font-weight="bold" fill="url(#goldText)"
        text-anchor="middle" letter-spacing="-4">MP</text>
</svg>
