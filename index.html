<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#07101e">
  <title>Mola Prono</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ═══ POPUP NOTIFICATION (tap depuis barre) ═══ -->
<div id="notif-popup" class="notif-popup-overlay" onclick="closeNotifPopup()" style="display:none">
  <div class="notif-popup-box" onclick="event.stopPropagation()">
    <span class="notif-popup-icon">🔔</span>
    <div class="notif-popup-title" id="notif-popup-title"></div>
    <div class="notif-popup-body"  id="notif-popup-body"></div>
    <a href="https://whatsapp.com/channel/0029VbBrwdH1noz3OjnU5B2V" target="_blank" rel="noopener" class="notif-popup-btn notif-popup-wa-btn" onclick="openWaCoupon(); return false;">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Voir le coupon
    </a>
  </div>
</div>

<!-- ═══ BANNIÈRE IN-APP ═══ -->
<div id="notif-banner" class="in-app-notif" onclick="dismissBanner()">
  <div class="notif-banner-inner">
    <span class="notif-banner-icon">🔔</span>
    <div>
      <span id="notif-banner-title"></span>
      <span id="notif-banner-body"></span>
    </div>
    <span class="notif-banner-close">✕</span>
  </div>
</div>


<!-- ═══ HEADER ═══ -->
<header class="app-header">
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="logo-wrap">
      <img src="/logo.png" alt="Mola Prono" class="logo-img" onerror="this.style.display='none'">
      <div>
        <div class="app-title">Mola <em>Prono</em></div>
        <div class="app-sub">Pronostics Football</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-date" id="header-date"></div>
      <button class="header-share-btn" onclick="shareApp()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Partager l'application
      </button>
    </div>
  </div>
</header>

<!-- ═══ PAGE PRONOSTICS ═══ -->
<div id="page-pronos" class="tab-page active">
  <div class="main-content">
    <div class="section-header">
      <h2 class="section-title">Pronostics du Jour</h2>
      <span class="count-badge" id="pred-count">0</span>
      <span class="update-info" id="update-ts"></span>
    </div>
    <div class="cards-grid" id="cards">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Chargement…</p>
      </div>
    </div>
  </div>


  <!-- Promo bookmakers -->
  <div class="promo-banner">
    <div class="promo-logos">
      <div class="promo-logo-item">
        <img src="https://mola-prono.online/images/1xBet-logo.png" alt="1XBET">
      </div>
      <div class="promo-logo-item">
        <img src="https://mola-prono.online/images/Melbet-Logo.webp" alt="MELBET">
      </div>
      <div class="promo-logo-item">
        <img src="https://mola-prono.online/images/Linebet.logo.jpg" alt="LINEBET">
      </div>
    </div>
    <div class="promo-text">
      Utilisez le code promo 👉 <span class="promo-code">KS15</span> sur 1XBET, MELBET, LINEBET et obtenez <span class="promo-bonus">200% de bonus de bienvenue</span>
    </div>
  </div>
</div>

<!-- ═══ PAGE NOTIFICATIONS ═══ -->
<div id="page-notifs" class="tab-page">
  <div class="main-content">
    <div class="section-header">
      <h2 class="section-title">Notifications</h2>
      <span class="count-badge" id="notif-count">0</span>

    </div>
    <div id="notif-list"></div>
  </div>
</div>

<!-- ═══ NAVIGATION BAS ═══ -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('pronos', this)">
    <span class="nav-icon">⚽</span>
    <span class="nav-lbl">Pronostics</span>
  </button>
  <button class="nav-btn" onclick="switchTab('notifs', this)">
    <span class="nav-icon-wrap">
      <span class="nav-icon">🔔</span>
      <span id="notif-badge" class="notif-badge hidden"></span>
    </span>
    <span class="nav-lbl">Notifications</span>
  </button>
</nav>

<script type="module" src="/src/app.js"></script>
</body>
</html>
