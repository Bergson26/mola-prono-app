<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#07101e">
  <title>Mola Prono</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ═══ BANNIÈRE IN-APP ═══ -->
<div id="notif-banner" class="in-app-notif" onclick="dismissBanner()">
  <div class="notif-banner-inner">
    <span class="notif-banner-icon">🔔</span>
    <div>
      <span id="notif-banner-title"></span>
      <span id="notif-banner-body"></span>
    </div>
    <span class="notif-banner-close">✕</span>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<header class="app-header">
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="logo-wrap">
      <img src="/logo.svg" alt="Mola Prono" class="logo-img" onerror="this.style.display='none'">
      <div>
        <div class="app-title">Mola <em>Prono</em></div>
        <div class="app-sub">Pronostics Football</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-date" id="header-date"></div>
    </div>
  </div>
</header>

<!-- ═══ PAGE PRONOSTICS ═══ -->
<div id="page-pronos" class="tab-page active">
  <div class="main-content">
    <div class="section-header">
      <h2 class="section-title">Pronostics du Jour</h2>
      <span class="count-badge" id="pred-count">0</span>
      <span class="update-info" id="update-ts"></span>
    </div>
    <div class="cards-grid" id="cards">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Chargement…</p>
      </div>
    </div>
  </div>

  <!-- Partager l'application -->
  <div class="share-section">
    <button class="share-btn" onclick="shareApp()">
      📲 Partager l'application
    </button>
  </div>

  <!-- ═══ WHATSAPP BANNER (APRÈS LES PRONOSTICS) ═══ -->
  <a href="https://whatsapp.com/channel/0029VbBrwdH1noz3OjnU5B2V" target="_blank" class="wa-banner-link">
    <div class="wa-banner-mobile">
      <div class="wa-main-text">
        Coupon du jour sur WhatsApp 👉
        <strong>SCORE EXACT DU JOUR</strong>
      </div>
      <span class="wa-join-mobile">Rejoindre</span>
    </div>
  </a>

  <!-- Promo bookmakers -->
  <div class="promo-banner">
    <div class="promo-inner">
      <span class="promo-icon">🎁</span>
      <div class="promo-text">
        <strong>Code promo <span class="promo-code">KS15</span> sur 1XBET, MELBET &amp; LINEBET</strong>
        <span>Bonus de bienvenue 150 000F gratuit et retirable !</span>
      </div>
    </div>
  </div>
</div>

<!-- ═══ PAGE NOTIFICATIONS ═══ -->
<div id="page-notifs" class="tab-page">
  <div class="main-content">
    <div class="section-header">
      <h2 class="section-title">Notifications</h2>
      <span class="count-badge" id="notif-count">0</span>
      <button id="clear-notifs-btn" class="clear-notifs-btn" onclick="clearNotifHistory()" style="display:none">
        Tout effacer
      </button>
    </div>
    <div id="notif-list"></div>
  </div>
</div>

<!-- ═══ NAVIGATION BAS ═══ -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('pronos', this)">
    <span class="nav-icon">⚽</span>
    <span class="nav-lbl">Pronostics</span>
  </button>
  <button class="nav-btn" onclick="switchTab('notifs', this)">
    <span class="nav-icon-wrap">
      <span class="nav-icon">🔔</span>
      <span id="notif-badge" class="notif-badge hidden"></span>
    </span>
    <span class="nav-lbl">Notifications</span>
  </button>
</nav>

<script type="module" src="/src/app.js"></script>
</body>
</html>
