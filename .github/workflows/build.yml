name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build web assets (Vite)
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Set minSdkVersion to 23
        run: sed -i 's/minSdkVersion = 22/minSdkVersion = 23/' android/variables.gradle

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate app icons from logo
        run: |
          sudo apt-get install -y librsvg2-bin
          for size in 48 72 96 144 192; do
            case $size in
              48)  dir="mipmap-mdpi"    ;;
              72)  dir="mipmap-hdpi"    ;;
              96)  dir="mipmap-xhdpi"   ;;
              144) dir="mipmap-xxhdpi"  ;;
              192) dir="mipmap-xxxhdpi" ;;
            esac
            rsvg-convert -w $size -h $size resources/icon.svg \
              -o android/app/src/main/res/${dir}/ic_launcher.png
            rsvg-convert -w $size -h $size resources/icon.svg \
              -o android/app/src/main/res/${dir}/ic_launcher_round.png
          done

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mola-prono-app-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
