name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build web assets (Vite)
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Set minSdkVersion to 23
        run: sed -i 's/minSdkVersion = 22/minSdkVersion = 23/' android/variables.gradle

      - name: Set targetSdkVersion to 35
        run: sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/' android/variables.gradle

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate app icons from logo
        run: |
          sudo apt-get install -y imagemagick
          for size in 48 72 96 144 192; do
            case $size in
              48)  dir="mipmap-mdpi"    ;;
              72)  dir="mipmap-hdpi"    ;;
              96)  dir="mipmap-xhdpi"   ;;
              144) dir="mipmap-xxhdpi"  ;;
              192) dir="mipmap-xxxhdpi" ;;
            esac
            convert logo.png -resize ${size}x${size} \
              android/app/src/main/res/${dir}/ic_launcher.png
            convert logo.png -resize ${size}x${size} \
              android/app/src/main/res/${dir}/ic_launcher_round.png
            convert logo.png -resize ${size}x${size} \
              android/app/src/main/res/${dir}/ic_launcher_foreground.png
          done
          # Supprimer les adaptive icons XML qui ignorent nos PNG
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Configure splash screen (logo Mola Prono)
        run: |
          convert logo.png -resize 288x288 \
            android/app/src/main/res/drawable/ic_splash.png
          find android/app/src/main/res -name "splash.*" -delete
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<layer-list xmlns:android="http://schemas.android.com/apk/res/android">' \
            '    <item android:drawable="@android:color/white"/>' \
            '    <item>' \
            '        <bitmap android:src="@drawable/ic_splash" android:gravity="center"/>' \
            '    </item>' \
            '</layer-list>' \
            > android/app/src/main/res/drawable/splash.xml

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 -d > $GITHUB_WORKSPACE/mola-prono.keystore
          echo "Keystore size: $(wc -c < $GITHUB_WORKSPACE/mola-prono.keystore) bytes"

      - name: Configure release signing
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS:   ${{ secrets.KEY_PASSWORD }}
        run: |
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$GITHUB_WORKSPACE/mola-prono.keystore" \
            "$STORE_PASS" "mola-prono" "$KEY_PASS" \
            > android/keystore.properties
          python3 scripts/patch_signing.py

      - name: Build APK release + AAB release
        run: |
          set -o pipefail
          cd android && ./gradlew assembleRelease bundleRelease --no-daemon \
            2>&1 | tee /tmp/build.log

      - name: Upload APK + AAB
        uses: actions/upload-artifact@v4
        with:
          name: mola-prono-release-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
