name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build web assets (Vite)
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Set minSdkVersion to 23
        run: sed -i 's/minSdkVersion = 22/minSdkVersion = 23/' android/variables.gradle

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate app icons from logo
        run: |
          sudo apt-get install -y librsvg2-bin
          for size in 48 72 96 144 192; do
            case $size in
              48)  dir="mipmap-mdpi"    ;;
              72)  dir="mipmap-hdpi"    ;;
              96)  dir="mipmap-xhdpi"   ;;
              144) dir="mipmap-xxhdpi"  ;;
              192) dir="mipmap-xxxhdpi" ;;
            esac
            rsvg-convert -w $size -h $size resources/icon.svg \
              -o android/app/src/main/res/${dir}/ic_launcher.png
            rsvg-convert -w $size -h $size resources/icon.svg \
              -o android/app/src/main/res/${dir}/ic_launcher_round.png
            rsvg-convert -w $size -h $size resources/icon.svg \
              -o android/app/src/main/res/${dir}/ic_launcher_foreground.png
          done
          # Supprimer les adaptive icons XML qui ignorent nos PNG
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Configure splash screen (logo Mola Prono)
        run: |
          rsvg-convert -w 288 -h 288 resources/icon.svg \
            -o android/app/src/main/res/drawable/ic_splash.png
          find android/app/src/main/res -name "splash.*" -delete
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<layer-list xmlns:android="http://schemas.android.com/apk/res/android">' \
            '    <item android:drawable="@android:color/white"/>' \
            '    <item>' \
            '        <bitmap android:src="@drawable/ic_splash" android:gravity="center"/>' \
            '    </item>' \
            '</layer-list>' \
            > android/app/src/main/res/drawable/splash.xml

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (release signé si keystore dispo, sinon debug)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          if [ -n "$KEYSTORE_B64" ]; then
            echo "→ Build RELEASE signé"
            echo "$KEYSTORE_B64" | base64 -d > android/app/mola-prono.keystore
            cd android && ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/mola-prono.keystore \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=mola-prono \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              2>&1 | tee /tmp/build.log
          else
            echo "→ Build DEBUG (keystore non configuré)"
            cd android && ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mola-prono-app-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
