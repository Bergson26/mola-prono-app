name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore mola-prono.keystore \
            -alias mola-prono \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass MolaPro2026! \
            -keypass MolaPro2026! \
            -dname "CN=Mola Prono,OU=Mobile,O=Mola Prono,L=Cotonou,C=BJ"

      - name: Display base64 (copy this as KEYSTORE_BASE64 secret)
        run: base64 -w 0 mola-prono.keystore
